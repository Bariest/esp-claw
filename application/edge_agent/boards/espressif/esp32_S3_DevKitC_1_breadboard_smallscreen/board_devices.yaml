version: 1.0.0
# Devices Configuration
devices:

  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        public: true
    config:
      max_leds: 1                  # Number of LEDs in the strip
    peripherals:
      - name: rmt_tx               # RMT TX peripheral used by the LED strip

  - name: fake_camera # Just for invoking camera dependencies, no actual camera hardware connected
    type: camera
    version: default
    sub_type: "dvp"
    init_skip: true
    peripherals:
      - name: i2c_master                   # Must match a periph_i2c name; provides SCCB i2c_handle to esp_video
        frequency: 100000                   # SCCB I2C frequency (Hz)

  - name: camera
    type: custom
    version: default
    dependencies:
      espressif/usb_host_uvc: "2.4.2"

  - name: audio_dac
    chip: internal
    type: audio_codec
    version: default
    init_skip: true
    config:
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      dac_init_gain: 0
    peripherals:
      - name: i2s_audio_out

  - name: audio_adc
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/usb_host_uac: "^1.3.0"
    config:
      sample_rate_hz: 16000           # Sample rate in Hz


  - name: display_lcd
    chip: st7735
    type: display_lcd
    sub_type: spi
    version: default
    dependencies:
      teriyakigod/esp_lcd_st7735: "*"
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: true
      invert_color: true
      x_max: 160
      y_max: 80
      io_spi_config:
        cs_gpio_num: -1
        dc_gpio_num: 39
        spi_mode: 0
        pclk_hz: 10000000

      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display
