version: 1.0.0
# Peripherals Configuration
peripherals:
  - name: rmt_tx
    type: rmt
    role: tx
    config:
      gpio_num: 48
      clk_src: RMT_CLK_SRC_DEFAULT
      resolution_hz: 10000000
      mem_block_symbols: 64
      trans_queue_depth: 4
      intr_priority: 1
      flags:
        invert_out: false
        with_dma: true  # RMT peripheral can connect to DMA channel in esp32s3
        io_loop_back: false
        io_od_mode: false
        allow_pd: false
        init_level: false

  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 2
        scl: 3

  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config:
      sample_rate_hz: 24000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_16BIT
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      ws_pol: false
      bit_shift: true
      left_align: true
      big_endian: false
      bit_order_lsb: false
      pins:
        mclk: 38                    # [IO] I2S MCLK
        bclk: 14                    # [IO] I2S BCLK
        ws: 13                      # [IO] I2S LRCK / WS
        dout: 45                    # [IO] I2S speaker data output
        din: -1
      invert_flags:
        mclk_inv: false
        bclk_inv: false
        ws_inv: false

  # LCD SPI configuration for the 160x80 ST7735 SPI color panel.
  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        data0_io_num: 40
        sclk_io_num: 41
        max_transfer_sz: 25600

  # The backlight PMOS is active-low on GPIO42, so keep duty high at boot.
  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 42
      freq_hz: 5000
      duty: 1023
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: true
